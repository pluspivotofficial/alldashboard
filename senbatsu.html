<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人選データ取り込み</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }
  .header { background: #1A2855; color: #fff; padding: 20px 24px; }
  .header h1 { font-size: 19px; font-weight: 700; }
  .header p { font-size: 13px; opacity: .85; margin-top: 4px; }
  .container { max-width: 760px; margin: 24px auto; padding: 0 16px; }
  .card { background: #fff; border-radius: 12px; padding: 22px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card h2 { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: #1A2855; }
  .drop { border: 2px dashed #93c5fd; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: background .2s; }
  .drop:hover { background: #eff6ff; }
  .drop input { display: none; }
  .drop p { color: #6b7280; font-size: 13px; margin-top: 8px; }
  .btn { display: inline-block; padding: 11px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; background: #2563eb; color: #fff; }
  .btn:disabled { background: #93c5fd; cursor: default; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 14px; }
  .status { font-size: 13px; color: #374151; margin-top: 12px; min-height: 20px; }
  .muted { font-size: 12px; color: #6b7280; line-height: 1.7; }
  code { background: #eef2ff; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  .result { margin-top: 12px; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
  .result h3 { font-size: 13px; font-weight: 700; color: #1A2855; background: #f8fafc; padding: 9px 14px; border-bottom: 1px solid #e5e7eb; }
  .gline { display: flex; align-items: baseline; gap: 8px; padding: 9px 14px; border-bottom: 1px solid #f1f5f9; }
  .gline:last-child { border-bottom: none; }
  .gline .g { width: 64px; font-weight: 700; }
  .gline .gA { color: #b45309; } .gline .gB { color: #1d4ed8; } .gline .gC { color: #0f766e; } .gline .gO { color: #6b7280; }
  .gline .n { font-size: 17px; font-weight: 800; color: #111827; }
  .gline .add { font-size: 12px; color: #16a34a; font-weight: 700; }
  .gline .add.zero { color: #9ca3af; font-weight: 600; }
</style>
</head>
<body>
<div class="header">
  <h1>🧭 人選データ取り込み</h1>
  <p>当月の人選CSVを取り込み、人選ｽﾃｰﾀｽを自動判定してダッシュボードへ連動します</p>
</div>
<div class="container">
  <div class="card">
    <h2>📁 人選CSVを選択</h2>
    <div class="drop" id="drop" onclick="document.getElementById('file').click()">
      <div style="font-size:30px">📄</div>
      <strong>クリックまたはドラッグ＆ドロップ</strong>
      <p>「当月人選データ」と同じ項目のCSV（Shift-JIS / UTF-8 どちらも可）</p>
      <input type="file" id="file" accept=".csv">
    </div>
    <div class="row">
      <button class="btn" id="send" disabled onclick="upload()">☁️ 取り込んで人選判定</button>
      <span id="fileName" class="muted"></span>
    </div>
    <div class="status" id="status"></div>
  </div>
  <div class="card">
    <h2>この処理の内容</h2>
    <p class="muted">
      取り込むと、当月人選シートを <strong>毎回まるごと置き換え</strong>、各行の <code>人選ｽﾃｰﾀｽ</code> を
      <strong>4条件（有資格・介護経験・勤務日数LT・年齢60未満）</strong>で
      <code>A人選（★★★★）/ B人選（★★★☆）/ C人選（★★☆☆）/ その他</code> に自動判定します。
      ダッシュボードの人選数(A/B/C)にも反映されます。
    </p>
  </div>
</div>

<script>
const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbyAmjJUK96m_d7b45mZHrnQRhr8dL3470FRNAobEo62TlTBrpfe0uOgEN0GWmGD3j8/exec';
const UPLOAD_TOKEN = 'NMrci23nQlpFLFSpAQb3113A';

let csvText = '';
const $ = id => document.getElementById(id);

// Shift-JIS優先で読み、文字化けが多ければUTF-8で読み直す
function readCsv(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => {
      const t = e.target.result;
      if ((t.match(/�/g) || []).length > 5) {
        const r2 = new FileReader();
        r2.onload = e2 => res(e2.target.result);
        r2.readAsText(file, 'UTF-8');
      } else res(t);
    };
    r.readAsText(file, 'Shift_JIS');
  });
}

async function handleFile(file) {
  if (!file || !file.name.toLowerCase().endsWith('.csv')) { alert('CSVファイルを選択してください'); return; }
  csvText = await readCsv(file);
  const lines = (csvText.match(/\n/g) || []).length;
  $('fileName').textContent = `📄 ${file.name}（約${Math.max(0, lines - 1)}行）`;
  $('send').disabled = false;
  $('status').textContent = '';
}

async function upload() {
  if (!csvText) { alert('先にCSVを選択してください'); return; }
  $('send').disabled = true;
  $('status').textContent = '⏳ 取り込み中…（判定・反映まで20秒ほどかかります）';
  try {
    const res = await fetch(GAS_ENDPOINT, {
      method: 'POST',
      body: new URLSearchParams({ token: UPLOAD_TOKEN, type: 'senbatsu', csv: csvText }),
    });
    const j = await res.json();
    if (j.ok) {
      $('status').innerHTML =
        `<div>✅ 人選シートを更新しました（${j.rows}件）。<b>稼働データ投入後、ダッシュボードの「🔄 集計実行」</b>で反映してください。</div>`
        + renderTally(j.tally);
    } else {
      $('status').textContent = '⚠️ 失敗: ' + (j.error || 'unknown');
    }
  } catch (err) {
    $('status').textContent = '✅ 送信しました（応答は確認できませんでした）。ダッシュボード／シートで反映をご確認ください。';
  } finally {
    $('send').disabled = false;
  }
}

// 1次判定の内訳カードを描画
function renderTally(t) {
  if (!t) return '';
  const line = (cls, label, o) => {
    o = o || { total: 0, added: 0 };
    const add = `<span class="add${o.added ? '' : ' zero'}">（追加 ${o.added}名）</span>`;
    return `<div class="gline"><span class="g ${cls}">${label}</span><span class="n">${o.total}名</span>${add}</div>`;
  };
  return `<div class="result"><h3>🧭 1次判定の結果</h3>`
    + line('gA', 'A人選', t.A) + line('gB', 'B人選', t.B) + line('gC', 'C人選', t.C) + line('gO', 'その他', t.other)
    + `</div>`;
}

$('file').addEventListener('change', e => handleFile(e.target.files[0]));
const d = $('drop');
d.addEventListener('dragover', e => { e.preventDefault(); d.style.background = '#eff6ff'; });
d.addEventListener('dragleave', () => { d.style.background = ''; });
d.addEventListener('drop', e => { e.preventDefault(); d.style.background = ''; handleFile(e.dataTransfer.files[0]); });
</script>
</body>
</html>
