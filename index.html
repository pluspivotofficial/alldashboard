<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>応募ダッシュボード（モック）｜オフィス別</title>
<!--
  ===========================================================================
  軽量ダッシュボード モック（叩き台）— ドリルダウン型（一覧 → オフィス詳細）
  - 外部ライブラリ・外部フォント・画像なし。単一HTML + バニラJS + インラインSVG。
  - SAMPLE_DATA を GAS が返す集計済みJSON（docs/dashboard-redesign.md のスキーマ）
    に差し替えるだけで本番化できる。本番は loadFromApi() の fetch() を有効化。
  ===========================================================================
-->
<style>
  :root{
    --navy:#1A2855; --navy-soft:#4a5578; --ink:#1f2640; --muted:#7a809c;
    --line:#e7e9f2; --bg:#f5f6fb; --card:#ffffff;
    --coral:#E85A4F; --gold:#E8A93F;
    --green:#1f9d6b; --green-bg:#e7f6ef; --red:#d14535; --red-bg:#fdeceb;
    --reblue:#6b86c9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Meiryo", sans-serif;
    color:#1f2640; background:var(--bg); line-height:1.5; font-size:14px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1100px;margin:0 auto;padding:20px 18px 60px}

  header.top{display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px;justify-content:space-between;margin-bottom:18px}
  .title h1{font-size:20px;color:var(--navy);letter-spacing:.02em}
  .title p{font-size:12px;color:var(--muted);margin-top:2px}
  .controls{display:flex;gap:8px;align-items:center}
  select,button{font:inherit;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 11px;cursor:pointer}
  button.refresh{background:var(--navy);color:#fff;border-color:var(--navy)}
  .updated{font-size:11px;color:var(--muted);margin-top:12px}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .kpi .k-label{font-size:11px;color:var(--muted)}
  .kpi .k-val{font-size:24px;font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums}
  .kpi .k-sub{font-size:11px;color:var(--muted)}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:16px}
  .panel-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  .panel-head h2{font-size:14px;color:var(--navy)}
  .panel-head .hint{font-size:11px;color:var(--muted)}
  .scroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
  th,td{padding:9px 12px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line)}
  th.l,td.l{text-align:left}
  thead th{background:#fafbff;color:var(--navy-soft);font-size:12px;font-weight:700}
  tbody td{font-size:13px}
  td.office{font-weight:600;color:var(--ink)}
  td.pref{font-size:11px;color:var(--muted);font-weight:400}
  td.ref{color:var(--muted);font-size:12px}
  tfoot td{background:#f4f5fb;font-weight:700;color:var(--navy);border-top:2px solid var(--line)}
  tr.subtotal td{background:#eef1fa;font-weight:700;color:var(--navy-soft);border-top:1px solid var(--line)}
  tr.subtotal td.l{color:var(--navy)}
  .catbtn{font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer}
  .catbtn.on{background:var(--navy);color:#fff;border-color:var(--navy)}

  tr.click{cursor:pointer}
  tr.click:hover{background:#f0f3ff}
  tr.click-area{cursor:pointer}
  tr.click-area:hover td{background:#e3e8fb}
  tr.click td.office::after{content:"›";color:var(--muted);margin-left:8px;font-weight:700}

  .bar{display:inline-flex;align-items:center;gap:7px;justify-content:flex-end;width:100%}
  .bar .track{flex:0 0 56px;height:7px;background:#eef0f6;border-radius:5px;overflow:hidden}
  .bar .fill{height:100%;border-radius:5px;background:var(--coral)}
  .bar .pct{font-size:11px;color:var(--muted);min-width:32px;text-align:right}

  /* 達成率メーター（赤<80 / 黄80-99 / 緑100+） */
  .meter{display:inline-flex;align-items:center;gap:8px;justify-content:flex-end;width:100%}
  .meter .pct{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;min-width:38px;text-align:right}
  .meter .track{position:relative;flex:0 0 68px;height:9px;background:#eef0f6;border-radius:6px;overflow:hidden}
  .meter .track::after{content:"";position:absolute;top:0;bottom:0;left:calc(100% - 1px);width:1px;background:#c2c7da} /* 100%目盛り */
  .meter .fill{display:block;height:100%;border-radius:6px;transition:width .3s}
  .meter.m-red .fill{background:var(--red)}    .meter.m-red .pct{color:var(--red)}
  .meter.m-yellow .fill{background:var(--gold)} .meter.m-yellow .pct{color:#b07d14}
  .meter.m-green .fill{background:var(--green)} .meter.m-green .pct{color:var(--green)}

  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
  .pill.up{background:var(--green-bg);color:var(--green)}
  .pill.down{background:var(--red-bg);color:var(--red)}

  /* chart */
  .chart-legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--navy-soft);padding:10px 16px 0}
  .chart-legend .sw{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:middle}
  .chart-wrap{padding:6px 10px 14px}
  svg{display:block;width:100%;height:auto}
  .gridln{stroke:#eef0f6;stroke-width:1}
  .axis{fill:var(--muted);font-size:10px}
  .totline{fill:none;stroke:var(--navy);stroke-width:1.6}
  .totdot{fill:var(--navy)}

  /* 未登録者アラート */
  .alert{background:#fff7f5;border:1px solid #f3c5bf;border-left:4px solid var(--coral);border-radius:12px;padding:14px 16px;margin-bottom:16px}
  .alert-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;cursor:pointer}
  .alert-head h2{font-size:14px;color:var(--coral)}
  .alert-head .big{font-size:20px;font-weight:800;color:var(--coral)}
  .alert-head .date{font-size:12px;color:var(--muted)}
  .alert-head .tg{margin-left:auto;font-size:12px;color:var(--coral)}
  .alert-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .alert-chip{background:#fff;border:1px solid #f3c5bf;border-radius:999px;padding:3px 10px;font-size:12px;color:var(--ink)}
  .alert-chip b{color:var(--coral)}
  .alert-list{margin-top:12px;border-top:1px dashed #f3c5bf;padding-top:10px}
  .alert-ok{font-size:13px;color:var(--muted)}
  /* detail */
  .back{background:none;border:none;color:var(--coral);font-weight:700;padding:0;cursor:pointer;margin-bottom:12px}
  .detail-head{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
  .detail-head h2{font-size:22px;color:var(--navy)}
  .detail-head .pref{font-size:12px;color:var(--muted)}
  /* 開始の応募月分布（横棒） */
  .ba-wrap{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
  .ba-row{display:flex;align-items:center;gap:10px}
  .ba-l{width:62px;font-size:12px;color:var(--muted);text-align:right;flex:none}
  .ba-l.cur{color:var(--navy);font-weight:700}
  .ba-track{flex:1;background:#eef2f7;border-radius:6px;height:18px;overflow:hidden}
  .ba-fill{height:100%;background:#93c5fd;border-radius:6px;min-width:2px}
  .ba-fill.cur{background:var(--navy)}
  .ba-n{width:128px;font-size:12px;font-weight:700;color:var(--ink);text-align:left;flex:none}
  .ba-br{font-weight:600;color:var(--muted);margin-left:6px}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;padding:14px 16px}
  .stat{border:1px solid var(--line);border-radius:10px;padding:11px 13px}
  .stat .s-l{font-size:11px;color:var(--muted)}
  .stat .s-v{font-size:21px;font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums}
  .stat .s-ref{font-size:11px;color:var(--coral);font-weight:700;margin-top:2px}
  .sel-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:14px 16px}
  .sel{text-align:center;border:1px solid var(--line);border-radius:10px;padding:11px 6px}
  .sel .s-v{font-size:22px;font-weight:700;color:var(--navy)}
  .sel .s-l{font-size:11px;color:var(--muted)}
  .sel.tagA{border-top:3px solid var(--green)} .sel.tagB{border-top:3px solid var(--gold)}
  .sel.tagC{border-top:3px solid var(--coral)} .sel.tagO{border-top:3px solid var(--navy-soft)}
  .sel.tagU{border-top:3px solid #c2c7da}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);padding:10px 16px 0}
  th.ref,td.refcol{color:var(--coral)}
  .hidden{display:none}

  /* chart interactivity */
  .chart-wrap{position:relative}
  .totline.dash{stroke-dasharray:3 4;opacity:.85}
  .tip{position:absolute;pointer-events:none;background:#1f2640;color:#fff;font-size:11px;line-height:1.5;padding:6px 9px;border-radius:7px;white-space:nowrap;transform:translate(-50%,-104%);opacity:0;transition:opacity .07s;z-index:6;box-shadow:0 3px 10px rgba(0,0,0,.22)}
  .tip b{font-variant-numeric:tabular-nums}

  /* sidebar layout */
  .app{display:flex;align-items:stretch;min-height:100vh}
  .sidebar{flex:0 0 196px;background:var(--navy);color:#fff;padding:16px 12px;position:sticky;top:0;height:100vh}
  .sidebar .brand{font-size:13px;font-weight:700;letter-spacing:.02em;padding:4px 8px 14px;border-bottom:1px solid rgba(255,255,255,.16);margin-bottom:12px}
  .nav-item{display:block;width:100%;text-align:left;background:transparent;border:none;color:#cfd6ee;font:inherit;font-weight:600;font-size:13px;padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px}
  .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
  .nav-item.active{background:#fff;color:var(--navy)}
  .main{flex:1 1 auto;min-width:0}
  .main .wrap{margin:0}
  @media(max-width:720px){
    .app{display:block}
    .sidebar{position:static;height:auto;display:flex;gap:6px;flex-wrap:wrap;padding:10px 12px}
    .sidebar .brand{display:none}
    .nav-item{width:auto;margin-bottom:0}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">📊 応募ダッシュボード</div>
    <button class="nav-item active" id="navOffice" data-sec="office">🏢 オフィス別</button>
    <button class="nav-item" id="navMedia" data-sec="media">📣 媒体別</button>
    <button class="nav-item" id="navSel" data-sec="selection">👥 人選別</button>
    <button class="nav-item" id="navAna" data-sec="analysis">📈 分析</button>
  </aside>
  <div class="main"><div class="wrap">
  <header class="top">
    <div class="title">
      <h1 id="secTitle">応募ダッシュボード</h1>
      <p id="secSub">オフィス別｜総応募・MCG・人選を突合した集計ビュー</p>
    </div>
    <div class="controls">
      <select id="monthSel">
        <option value="2026-05">2026年5月</option>
        <option value="2026-06">2026年6月</option>
      </select>
      <button id="exportSelBtn" title="人選シートから 人材番号＋人選ｽﾃｰﾀｽ だけのCSVをダウンロード">⬇ 人選CSV出力</button>
      <button id="exportReportBtn" title="当月応募(純新規/再)・開始の内訳をレポートシートへ出力">📤 シート出力</button>
      <button class="refresh" id="refreshBtn">更新</button>
    </div>
  </header>

  <!-- ===== オフィス別セクション ===== -->
  <div id="officeSection">
  <!-- 一覧ビュー -->
  <div id="listView">
    <div id="alertView"></div>
    <div class="kpis" id="kpis"></div>

    <div class="panel">
      <div class="panel-head">
        <h2>日次の応募推移（全体）</h2>
        <select id="officeChartMode">
          <option value="total">総応募（新規＋再応募）</option>
          <option value="ab">A+B人選のみ</option>
        </select>
      </div>
      <div class="chart-legend" id="officeLegend"></div>
      <div class="chart-wrap" id="chart"></div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>オフィス一覧</h2><span class="hint">行をクリックで詳細へ</span></div>
      <div class="scroll" id="listTable"></div>
    </div>
  </div>

  <!-- 詳細ビュー -->
  <div id="detailView" class="hidden"></div>
  </div><!-- /officeSection -->

  <!-- ===== 媒体別セクション ===== -->
  <div id="mediaSection" class="hidden">
    <div id="mediaListView"></div>
    <div id="mediaDetailView" class="hidden"></div>
  </div>

  <!-- ===== 人選別セクション ===== -->
  <div id="selectionSection" class="hidden">
    <div id="selListView"></div>
    <div id="selDetailView" class="hidden"></div>
  </div>

  <!-- ===== 分析セクション ===== -->
  <div id="analysisSection" class="hidden">
    <div id="analysisView"></div>
  </div>

  <p class="updated" id="updated"></p>
  </div></div><!-- /wrap /main -->
</div><!-- /app -->

<script>
/* ============================================================
   サンプルデータ（GASの集計済みJSONと同一スキーマ）
   本番では loadFromApi() に差し替え
   ============================================================ */
const SAMPLE_DATA = {
  generatedAt: "2026-06-19T06:00:00+09:00",
  month: "2026-06",
  daily: [], // ← モックでは下の genDaily() で生成。本番は集計層が埋める: [{date,new,re,total}]
  offices: [
    { office:"新宿オフィス", prefectures:["東京都"],
      overview:{ newApplications:42, phoneApplications:6, reApplications:8, targetNew:60, forecast:55, contacts:30, newAB:14, reAB:3 },
      selection:{ A:5, B:10, C:8, other:3, unknown:2 },
      funnel:{ currentMonthNew:{set:20,done:15,decided:8,started:5,ab:9}, within2MonthsNew:{set:10,done:7,decided:4,started:2,ab:5}, reApplication:{set:6,done:4,decided:2,started:1,ab:2} } },
    { office:"横浜オフィス", prefectures:["神奈川県"],
      overview:{ newApplications:38, phoneApplications:4, reApplications:5, targetNew:45, forecast:48, contacts:27, newAB:12, reAB:2 },
      selection:{ A:6, B:8, C:6, other:2, unknown:4 },
      funnel:{ currentMonthNew:{set:18,done:12,decided:7,started:4,ab:8}, within2MonthsNew:{set:8,done:5,decided:3,started:2,ab:4}, reApplication:{set:4,done:3,decided:1,started:1,ab:1} } },
    { office:"大阪オフィス", prefectures:["大阪府","兵庫県"],
      overview:{ newApplications:51, phoneApplications:9, reApplications:11, targetNew:55, forecast:63, contacts:40, newAB:20, reAB:4 },
      selection:{ A:9, B:14, C:10, other:5, unknown:3 },
      funnel:{ currentMonthNew:{set:26,done:19,decided:11,started:7,ab:13}, within2MonthsNew:{set:12,done:9,decided:5,started:3,ab:6}, reApplication:{set:8,done:6,decided:3,started:2,ab:3} } },
    { office:"名古屋オフィス", prefectures:["愛知県"],
      overview:{ newApplications:29, phoneApplications:3, reApplications:4, targetNew:40, forecast:34, contacts:19, newAB:8, reAB:1 },
      selection:{ A:3, B:7, C:5, other:1, unknown:6 },
      funnel:{ currentMonthNew:{set:13,done:8,decided:4,started:2,ab:5}, within2MonthsNew:{set:6,done:4,decided:2,started:1,ab:3}, reApplication:{set:3,done:2,decided:1,started:0,ab:1} } },
    { office:"福岡オフィス", prefectures:["福岡県"],
      overview:{ newApplications:33, phoneApplications:5, reApplications:7, targetNew:35, forecast:40, contacts:24, newAB:11, reAB:2 },
      selection:{ A:4, B:9, C:7, other:2, unknown:3 },
      funnel:{ currentMonthNew:{set:16,done:11,decided:6,started:4,ab:7}, within2MonthsNew:{set:7,done:5,decided:3,started:2,ab:4}, reApplication:{set:5,done:3,decided:2,started:1,ab:2} } }
  ]
};

/* GAS Web アプリ（doGet）のデプロイURL。空文字のままだと SAMPLE_DATA で動作（モック）。
   本番は "https://script.google.com/macros/s/XXXX/exec" を設定するだけで接続される。 */
const API_URL = "https://script.google.com/macros/s/AKfycbyAmjJUK96m_d7b45mZHrnQRhr8dL3470FRNAobEo62TlTBrpfe0uOgEN0GWmGD3j8/exec";
async function loadFromApi(month){
  const res = await fetch(`${API_URL}?month=${encodeURIComponent(month)}`);
  if(!res.ok) throw new Error("API "+res.status);
  const json = await res.json();
  if(json.error) throw new Error(json.error+"（"+month+"）");
  return json;
}

/* モック専用: 日次データを生成（本番は集計層が daily を埋める） */
function genDaily(month){
  const days = month==="2026-06" ? 19 : 31;
  const out=[];
  for(let d=1; d<=days; d++){
    const nw = Math.max(2, 9 + Math.round(5*Math.sin(d/2.5)) + (d%4));
    const re = Math.max(0, Math.round(nw*0.18) + (d%3));
    out.push({ date:`${month}-${String(d).padStart(2,"0")}`, new:nw, re:re, total:nw+re });
  }
  return out;
}

let DATA = SAMPLE_DATA;

const $ = s => document.querySelector(s);
const num = n => (n==null ? "–" : Number(n).toLocaleString("ja-JP"));
const sum = (arr,path) => arr.reduce((a,o)=>a + path.split(".").reduce((x,k)=>x?.[k] ?? 0, o), 0);
const pill = d => d>=0 ? `<span class="pill up">+${num(d)}</span>` : `<span class="pill down">${num(d)}</span>`;
/* 達成率メーター（赤<80 / 黄80-99 / 緑100+） */
const meter = rate => {
  const r = Number(rate)||0;
  const cls = r>=100 ? "m-green" : (r>=80 ? "m-yellow" : "m-red");
  return `<div class="meter ${cls}"><span class="pct">${r}%</span><span class="track"><span class="fill" style="width:${Math.min(100,Math.max(0,r))}%"></span></span></div>`;
};

/* ---- KPI ---- */
function renderKpis(){
  const o=DATA.offices;
  const newApp=sum(o,"overview.newApplications"), target=sum(o,"overview.targetNew");
  const phone=sum(o,"overview.phoneApplications");
  const fore=sum(o,"overview.forecast"), reApp=sum(o,"overview.reApplications"), contacts=sum(o,"overview.contacts");
  const selTotal=["A","B","C","other","unknown"].reduce((a,k)=>a+sum(o,"selection."+k),0);
  const rate=target?Math.round(newApp/target*100):0;
  const kpi=(l,v,s)=>`<div class="kpi"><div class="k-label">${l}</div><div class="k-val">${v}</div><div class="k-sub">${s}</div></div>`;
  $("#kpis").innerHTML=[
    kpi("新規応募（合計）",num(newApp),`うち電話 ${num(phone)}・目標 ${num(target)}（${rate}%）`),
    kpi("再応募（合計）",num(reApp),"過去データと重複"),
    kpi("着地見込み（合計）",num(fore),pill(fore-target)+" 対目標"),
    kpi("人選数（合計）",num(selTotal),"A〜不明の合計"),
    kpi("接触数（合計）",num(contacts),"MCG 由来")
  ].join("");
}

/* ---- 日次グラフ群（全日付・ホバー・着地予測点線・A+B切替・媒体内訳） ---- */
const CHART={W:720,H:212,padL:34,padR:12,padT:12,padB:34};
const MEDIA_COLORS=['#1A2855','#E85A4F','#6b86c9','#E8A93F','#1f9d6b','#9d6bc9','#c97c6b','#7a809c','#3fa7e8','#b0418a'];

function monthAxis(month){
  const [y,m]=(month||"").split("-").map(Number);
  const dim=(y&&m)?new Date(y,m,0).getDate():30;
  const now=new Date(), cur=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  const elapsed=(cur===month)?Math.min(now.getDate(),dim):dim;
  const days=[]; for(let d=1;d<=dim;d++) days.push({day:d,date:`${month}-${String(d).padStart(2,"0")}`});
  return {days,dim,elapsed};
}
function gridLines(maxV,y){
  const W=CHART.W,padL=CHART.padL,padR=CHART.padR,g=[];
  for(let t=0;t<=4;t++){const v=Math.round(maxV*t/4),yy=y(v);
    g.push(`<line class="gridln" x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}"/><text class="axis" x="${padL-6}" y="${yy+3}" text-anchor="end">${v}</text>`);}
  return g.join("");
}
function attachTip(elId,cx,y,W,H,padL,plotW,n,days,fmt){
  const svg=$("#"+elId+"-svg"),tip=$("#"+elId+"-tip");
  svg.addEventListener("mousemove",ev=>{
    const r=svg.getBoundingClientRect(); const sx=(ev.clientX-r.left)/r.width*W;
    let i=Math.round((sx-padL)/plotW*n-0.5); i=Math.max(0,Math.min(n-1,i));
    tip.innerHTML=fmt(i); tip.style.left=(svg.offsetLeft+cx(i)/W*r.width)+"px";
    tip.style.top=(svg.offsetTop+CHART.padT/H*r.height)+"px"; tip.style.opacity=1;
  });
  svg.addEventListener("mouseleave",()=>tip.style.opacity=0);
}

/* mode: 'total'(新規+再応募+総応募ライン) / 'ab'(A+B人選) / 'both'(総応募ライン+A+B人選ライン) */
function renderDailyChart(elId,daily,mode,month){
  const el=$("#"+elId); if(!el) return;
  const {days,dim,elapsed}=monthAxis(month);
  const by={}; (daily||[]).forEach(d=>by[d.date]=d);
  const get=date=>by[date]||{new:0,re:0,phone:0,total:0,ab:0};
  let aLen=0; days.forEach((d,i)=>{ if(by[d.date]) aLen=i+1; }); if(!aLen) aLen=Math.min(elapsed,days.length); // 実データのある最終日まで（残りは予測）
  const {W,H,padL,padR,padT,padB}=CHART, n=days.length, plotW=W-padL-padR, plotH=H-padT-padB;
  const barSpec = mode==="ab" ? [{key:"ab",color:"var(--gold)"}] : [{key:"new",color:"var(--coral)"},{key:"re",color:"var(--reblue)"},{key:"phone",color:"#14b8a6"}];
  const lineSpec = mode==="ab" ? [{key:"ab",color:"var(--gold)",fc:true}]
                 : mode==="both" ? [{key:"total",color:"var(--navy)",fc:true},{key:"ab",color:"var(--gold)",fc:false}]
                 : [{key:"total",color:"var(--navy)",fc:true}];
  let maxV=1;
  days.forEach(d=>{const r=get(d.date); maxV=Math.max(maxV,barSpec.reduce((a,s)=>a+(r[s.key]||0),0));});
  lineSpec.forEach(s=>days.forEach(d=>maxV=Math.max(maxV,get(d.date)[s.key]||0)));
  const fcSpec=lineSpec.find(s=>s.fc);
  let avg=0;
  if(fcSpec){const arr=days.slice(0,aLen).map(d=>get(d.date)[fcSpec.key]||0); avg=arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0; maxV=Math.max(maxV,avg);}
  const bw=Math.max(2,Math.min(20,plotW/n*0.7));
  const cx=i=>padL+plotW*(i+0.5)/n, y=v=>padT+plotH*(1-v/maxV);
  let bars="";
  days.forEach((d,i)=>{ if(i>=aLen) return; const r=get(d.date); let acc=0,x=cx(i)-bw/2;
    barSpec.forEach(s=>{const v=r[s.key]||0; if(!v) return; const yTop=y(acc+v),h=y(acc)-y(acc+v); bars+=`<rect x="${x}" y="${yTop}" width="${bw}" height="${Math.max(0,h)}" fill="${s.color}"/>`; acc+=v;});
  });
  let lines="";
  lineSpec.forEach(s=>{ const vals=days.map(d=>get(d.date)[s.key]||0);
    const ptsAct=vals.slice(0,aLen).map((v,i)=>`${cx(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
    lines+=`<polyline class="totline" points="${ptsAct}" stroke="${s.color}"/>`;
    if(s.fc && aLen<n && aLen>0){
      const rest=[`${cx(aLen-1).toFixed(1)},${y(vals[aLen-1]).toFixed(1)}`];
      for(let i=aLen;i<n;i++) rest.push(`${cx(i).toFixed(1)},${y(avg).toFixed(1)}`);
      lines+=`<polyline class="totline dash" points="${rest.join(" ")}" stroke="${s.color}"/>`;
    }
  });
  const fv=days.map(d=>get(d.date)[lineSpec[0].key]||0);
  const dots=fv.slice(0,aLen).map((v,i)=>`<circle class="totdot" cx="${cx(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2"/>`).join("");
  const xlab=days.map((d,i)=>`<text class="axis" x="${cx(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="8">${d.day}</text>`).join("");
  el.innerHTML=`<div class="tip" id="${elId}-tip"></div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" id="${elId}-svg">${gridLines(maxV,y)}${bars}${lines}${dots}${xlab}</svg>`;
  attachTip(elId,cx,y,W,H,padL,plotW,n,days,i=>{
    const r=get(days[i].date),proj=i>=aLen,md=days[i].date.slice(5);
    let h=mode==="ab"?`${md}　A+B人選 <b>${r.ab}</b>`:`${md}　新規 <b>${r.new}</b>・再 <b>${r.re}</b>・電話 <b>${r.phone||0}</b>・計 <b>${r.total}</b>`+(mode==="both"?`・A+B <b>${r.ab}</b>`:"");
    if(proj) h+=`<br><span style="opacity:.75">予測ペース ${Math.round(avg)}/日</span>`;
    return h;
  });
}

/* 媒体内訳の積み上げ（新規応募・日別） */
function renderMediaStackChart(elId,mediaList,month){
  const el=$("#"+elId); if(!el) return;
  const {days,dim,elapsed}=monthAxis(month);
  const series=(mediaList||[]).map((m,idx)=>{const by={};(m.daily||[]).forEach(d=>by[d.date]=d.new||0);return {media:m.media,color:MEDIA_COLORS[idx%MEDIA_COLORS.length],by};});
  const {W,H,padL,padR,padT,padB}=CHART, n=days.length, plotW=W-padL-padR, plotH=H-padT-padB;
  const dayTot=days.map(d=>series.reduce((a,s)=>a+(s.by[d.date]||0),0));
  const maxV=Math.max(1,...dayTot);
  const bw=Math.max(2,Math.min(20,plotW/n*0.7));
  const cx=i=>padL+plotW*(i+0.5)/n, y=v=>padT+plotH*(1-v/maxV);
  let bars="";
  days.forEach((d,i)=>{ if(i>=elapsed) return; let acc=0,x=cx(i)-bw/2;
    series.forEach(s=>{const v=s.by[d.date]||0; if(!v) return; const yTop=y(acc+v),h=y(acc)-y(acc+v); bars+=`<rect x="${x}" y="${yTop}" width="${bw}" height="${Math.max(0,h)}" fill="${s.color}"/>`; acc+=v;});
  });
  const xlab=days.map((d,i)=>`<text class="axis" x="${cx(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="8">${d.day}</text>`).join("");
  const legend=series.map(s=>`<span><span class="sw" style="background:${s.color}"></span>${s.media}</span>`).join("");
  el.innerHTML=`<div class="chart-legend">${legend}</div>
    <div class="chart-wrap" style="position:relative;padding:6px 0 0"><div class="tip" id="${elId}-tip"></div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" id="${elId}-svg">${gridLines(maxV,y)}${bars}${xlab}</svg></div>`;
  attachTip(elId,cx,y,W,H,padL,plotW,n,days,i=>{
    const md=days[i].date.slice(5);
    const ls=series.map(s=>{const v=s.by[days[i].date]||0;return v?`<span style="color:${s.color}">●</span>${s.media} ${v}`:null;}).filter(Boolean);
    return `${md}　新規計 <b>${dayTot[i]}</b><br>`+(ls.join("<br>")||"—");
  });
}

function sumOv(list){const ks=["newApplications","reApplications","targetNew","forecast","contacts","setMonth","startedMonth"];const r={};ks.forEach(k=>r[k]=list.reduce((a,o)=>a+(o.overview[k]||0),0));return r;}

/* ---- 詳細パネル（①②③④）：オフィス／エリア集計で共通 ---- */
function detailPanels(o){

  const statRef=(l,val,sub,ref)=>`<div class="stat"><div class="s-l">${l}</div><div class="s-v">${num(val)}</div>${sub?`<div class="s-l">${sub}</div>`:""}${ref!=null?`<div class="s-ref">うちA+B人選 ${num(ref)}</div>`:""}</div>`;

  const summary=`<div class="panel"><div class="panel-head"><h2>① 応募サマリー</h2><span class="hint">${DATA.month}</span></div>
    <div class="stat-grid">
      ${statRef("新規応募",v.newApplications,`目標 ${num(v.targetNew)}`,v.newAB)}
      ${stat("うち電話応募",v.phoneApplications,"内訳（MCGのみ）")}
      ${statRef("再応募",v.reApplications,"",v.reAB)}
      ${stat("目標(新規)",v.targetNew)}
      <div class="stat"><div class="s-l">達成率（着地見込み/目標）</div><div style="margin-top:8px">${meter(rate)}</div></div>
      <div class="stat"><div class="s-l">着地見込み</div><div class="s-v">${num(v.forecast)}</div><div class="s-l">${pill(v.forecast-v.targetNew)} 対目標</div></div>
      ${stat("接触数",v.contacts)}
    </div></div>`;
  const s=o.selection;
  const selCard=(cls,val,l)=>`<div class="sel ${cls}"><div class="s-v">${num(val)}</div><div class="s-l">${l}</div></div>`;
  const selection=`<div class="panel"><div class="panel-head"><h2>② 人選判定</h2><span class="hint">人数</span></div>
    <div class="sel-grid">
      ${selCard("tagA",s.A,"A人選")}${selCard("tagB",s.B,"B人選")}${selCard("tagC",s.C,"C人選")}${selCard("tagO",s.other,"その他")}${selCard("tagU",s.unknown,"不明")}
    </div></div>`;
  const groups=[["currentMonthNew","当月内応募・新規"],["within2MonthsNew","2ヶ月以内応募・新規"],["reApplication","再応募"]];
  const stats=[["set","設定"],["done","実施"],["decided","決定"],["started","開始"]];
  const frows=groups.map(([g,l])=>`<tr><td class="l">${l}</td>${stats.map(([k])=>`<td>${num(o.funnel[g][k])}</td>`).join("")}<td class="refcol">${num(o.funnel[g].ab)}</td></tr>`).join("");
  const funnel=`<div class="panel"><div class="panel-head"><h2>③ 歩留（設定→実施→決定→開始）</h2></div>

    <div class="scroll"><table>
      <thead><tr><th class="l">応募区分</th>${stats.map(([,l])=>`<th>${l}</th>`).join("")}<th class="ref">A+B人選</th></tr></thead>
      <tbody>${frows}</tbody>
    </table></div></div>`;
  const started=startedApplyPanel(o);
  return `${summary}${selection}${funnel}${started}`;
}

/* ---- 詳細: エリア集計（小計行クリック） ---- */
function officeAreaGroups(){
  const offices=DATA.offices||[];
  const g={}; offices.forEach(o=>{const a=o.area||"その他";(g[a]=g[a]||[]).push(o);});
  const areas=Object.keys(g).sort((a,b)=>{const ia=AREA_ORDER.indexOf(a),ib=AREA_ORDER.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  return areas.map(a=>({area:a,offices:g[a]}));
}
function aggArea(g){
  const ov={newApplications:0,reApplications:0,phoneApplications:0,targetNew:0,forecast:0,contacts:0,newAB:0,reAB:0,setMonth:0,startedMonth:0};
  const selection={A:0,B:0,C:0,other:0,unknown:0};
  const zf=()=>({set:0,done:0,decided:0,started:0,ab:0});
  const funnel={currentMonthNew:zf(),within2MonthsNew:zf(),reApplication:zf()};
  const startedApply={},startedList=[];
  (g.offices||[]).forEach(o=>{
    Object.keys(ov).forEach(k=>ov[k]+=(o.overview[k]||0));
    ["A","B","C","other","unknown"].forEach(k=>selection[k]+=(o.selection[k]||0));
    ["currentMonthNew","within2MonthsNew","reApplication"].forEach(c=>["set","done","decided","started","ab"].forEach(k=>funnel[c][k]+=(((o.funnel||{})[c]||{})[k]||0)));
    const sa=o.startedApply||{}; Object.keys(sa).forEach(mk=>{const src=sa[mk],t=(src&&typeof src==="object")?src:{total:src||0,new:0,re:0};const d=startedApply[mk]||(startedApply[mk]={total:0,new:0,re:0});d.total+=t.total||0;d.new+=t.new||0;d.re+=t.re||0;});
    (o.startedList||[]).forEach(p=>startedList.push(p));
  });
  return {office:g.area,area:g.area,overview:ov,selection:selection,funnel:funnel,startedApply:startedApply,startedList:startedList};
}
function showAreaDetail(idx){

/* ④ 当月に開始した人を、その人の「応募月」別に横棒で表示（新規/再応募つき） */
function saVal(x){ return (x&&typeof x==="object")?(x.total||0):(x||0); } // 旧形式(数値)も許容
function startedApplyPanel(o){
  const sa=o.startedApply||{};
  const keys=Object.keys(sa);
  const total=(o.overview&&o.overview.startedMonth)||keys.reduce((a,k)=>a+saVal(sa[k]),0);
  const head=`<div class="panel-head"><h2>④ 開始の内訳（応募月の分布）</h2><span class="hint">当月（${DATA.month}）に開始した ${num(total)}名を、応募した月で集計</span></div>`;
  if(!keys.length) return `<div class="panel">${head}<div style="padding:16px;color:var(--muted)">当月に開始した応募者はいません。</div></div>`;
  const ord=keys.filter(k=>k!=="不明").sort(); if(sa["不明"]!=null) ord.push("不明");
  const max=Math.max.apply(null,ord.map(k=>saVal(sa[k])));
  const mlabel=k=>{ if(k==="不明") return "不明"; const p=k.split("-"); return `${p[0]}/${+p[1]}`; };
  const rows=ord.map(k=>{
    const o2=sa[k], v=saVal(o2), nw=(o2&&o2.new)||0, re=(o2&&o2.re)||0;
    const w=max?Math.round(v/max*100):0, cur=(k===DATA.month);
    const br=(o2&&typeof o2==="object")?`<span class="ba-br">新規 ${num(nw)}・再 ${num(re)}</span>`:"";

function mediaOfficeRows(offs){
  const areaOf={}, order={}; (DATA.offices||[]).forEach((o,i)=>{areaOf[o.office]=o.area||"その他";order[o.office]=i;});
  const groups={}; (offs||[]).forEach(o=>{const a=areaOf[o.office]||"その他";(groups[a]=groups[a]||[]).push(o);});
  const areas=Object.keys(groups).sort((a,b)=>{const ia=AREA_ORDER.indexOf(a),ib=AREA_ORDER.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  const cells=o=>{const ov=o.overview;return `<td>${num(ov.newApplications)}</td><td>${num(ov.reApplications)}</td><td>${num(ov.phoneApplications)}</td><td>${num(ov.contacts)}</td><td>${num(mSelTotal(o))}</td><td class="refcol">${num(mSelAB(o))}</td><td>${yen(ov.budget)}</td><td>${cpa(ov.budget,ov.newApplications)}</td><td class="refcol">${cpa(ov.budget,mSelAB(o))}</td>`;};
  const sumObj=list=>{const ov={newApplications:0,reApplications:0,phoneApplications:0,contacts:0,budget:0},selection={A:0,B:0,C:0,other:0,unknown:0};list.forEach(o=>{Object.keys(ov).forEach(k=>ov[k]+=(o.overview[k]||0));["A","B","C","other","unknown"].forEach(k=>selection[k]+=(o.selection[k]||0));});return {overview:ov,selection:selection};};
  const multi=areas.length>1; let body="";
  areas.forEach(area=>{
    const list=groups[area].slice().sort((a,b)=>(order[a.office]??99)-(order[b.office]??99));
    list.forEach(o=>{body+=`<tr><td class="l office">${shortOffice(o.office)}</td>${cells(o)}</tr>`;});
    if(multi) body+=`<tr class="subtotal"><td class="l">小計：${area}</td>${cells(sumObj(list))}</tr>`;
  });
  return body;
}

let ANALYSIS=null;
const LTV_FE=["set","done","dec","start"], U2_FE=["応募","設定","実施","決定","開始"];
async function loadAnalysis(force){
  if(ANALYSIS && !ANALYSIS.error && !force) return;
  if(!API_URL){ ANALYSIS={error:"API未設定"}; return; }
  try{ const res=await fetch(`${API_URL}?analysis=1&t=${Date.now()}`); ANALYSIS=await res.json(); }
  catch(e){ ANALYSIS={error:String(e)}; }
}
function groupByArea_(objMap){
  const groups={}; Object.keys(objMap).forEach(off=>{const ar=objMap[off].area||"(未割当)";(groups[ar]=groups[ar]||[]).push(off);});
  const areas=Object.keys(groups).sort((a,b)=>{const ia=AREA_ORDER.indexOf(a),ib=AREA_ORDER.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  return {groups,areas};
}
function ltvCells_(node){
  const g=grp=>LTV_FE.map(k=>{const c=node[grp]&&node[grp][k]; return `<td>${c&&c.avg!=null?c.avg+'<span class="pref"> ('+c.n+')</span>':'–'}</td>`;}).join("");
  return g("new")+g("re");
}
function ltvPanel_(ltv){
  const {groups,areas}=groupByArea_(ltv.offices||{});
  let body="";
  areas.forEach(ar=>{
    groups[ar].forEach(off=>{ body+=`<tr><td class="l office">${off}</td>${ltvCells_(ltv.offices[off])}</tr>`; });
    if(areas.length>1 && ltv.areas[ar]) body+=`<tr class="subtotal"><td class="l">小計：${ar}</td>${ltvCells_(ltv.areas[ar])}</tr>`;
  });
  return `<div class="panel">
    <div class="panel-head"><h2>LTV分析（応募→各ステージ 平均経過日数）</h2><span class="hint">${ltv.window.from}〜${ltv.window.to}／上下10%除外・(n)=件数</span></div>
    <div class="scroll"><table>
      <thead><tr><th class="l" rowspan="2">オフィス</th><th colspan="4">新規（経過日数）</th><th colspan="4">再応募（経過日数）</th></tr>
      <tr><th>設定</th><th>実施</th><th>決定</th><th>開始</th><th>設定</th><th>実施</th><th>決定</th><th>開始</th></tr></thead>
      <tbody>${body||`<tr><td class="l" colspan="9">データなし</td></tr>`}</tbody>
    </table></div></div>`;
}
function u2Cells_(node){ const g=grp=>U2_FE.map(k=>`<td>${num(node[grp][k])}</td>`).join(""); return g("new")+g("re"); }
function util2mPanel_(u){
  const {groups,areas}=groupByArea_(u.offices||{});
  let body="";
  areas.forEach(ar=>{
    groups[ar].forEach(off=>{ body+=`<tr><td class="l office">${off}</td>${u2Cells_(u.offices[off])}</tr>`; });
    if(areas.length>1 && u.areas[ar]) body+=`<tr class="subtotal"><td class="l">小計：${ar}</td>${u2Cells_(u.areas[ar])}</tr>`;
  });
  return `<div class="panel">
    <div class="panel-head"><h2>2ヶ月用活用（前月 ${u.month} の歩留）</h2><span class="hint">応募→設定→実施→決定→開始（件数）</span></div>
    <div class="scroll"><table>
      <thead><tr><th class="l" rowspan="2">オフィス</th><th colspan="5">新規</th><th colspan="5">再応募</th></tr>
      <tr>${U2_FE.map(k=>`<th>${k}</th>`).join("")}${U2_FE.map(k=>`<th>${k}</th>`).join("")}</tr></thead>
      <tbody>${body||`<tr><td class="l" colspan="11">データなし</td></tr>`}</tbody>
    </table></div></div>`;
}
function renderAnalysis(){
  const a=ANALYSIS;
  if(!a){ $("#analysisView").innerHTML=`<div class="panel"><div style="padding:20px;color:var(--muted)">読み込み中…</div></div>`; return; }
  if(a.error){ $("#analysisView").innerHTML=`<div class="panel"><div class="panel-head"><h2>分析</h2></div><div style="padding:16px;color:var(--muted)">分析データが未生成です。GASエディタで <b>runAnalysis</b> を1回実行してください。<br><span style="font-size:11px">(${a.error})</span></div></div>`; return; }
  $("#analysisView").innerHTML = ltvPanel_(a.ltv) +
    `<p class="updated">分析生成: ${new Date(a.generatedAt).toLocaleString("ja-JP")}（履歴 ${num(a.records)}件）</p>`;
}

/* ===== セクション切替（サイドバー） ===== */
const SECMETA={
  office:{title:"応募ダッシュボード",sub:"オフィス別｜総応募・MCG・人選を突合した集計ビュー"},
  media:{title:"媒体別パフォーマンス",sub:"応募媒体ごと｜オフィス別の内訳まで（Indeed・キューメイトは統合）"},
  selection:{title:"人選別",sub:"人選グレード×新規/再応募｜オフィス・エリア小計／詳細で稼働率・応募者明細"},
  analysis:{title:"分析",sub:"LTV分析（180日前〜20日前）｜応募→各ステージの平均経過日数・オフィス/エリア小計"},
};
const SECID={office:"officeSection",media:"mediaSection",selection:"selectionSection",analysis:"analysisSection"};
function switchSection(sec){
  Object.keys(SECID).forEach(k=>$("#"+SECID[k]).classList.toggle("hidden",k!==sec));
  $("#navOffice").classList.toggle("active",sec==="office");
  $("#navMedia").classList.toggle("active",sec==="media");
  $("#navSel").classList.toggle("active",sec==="selection");
  $("#navAna").classList.toggle("active",sec==="analysis");
  $("#secTitle").textContent=SECMETA[sec].title; $("#secSub").textContent=SECMETA[sec].sub;
  if(sec==="media"){ renderMediaList(); showMediaList(); }
  else if(sec==="selection"){ renderSelList(); showSelList(); }
  else if(sec==="analysis"){ renderAnalysis(); loadAnalysis().then(renderAnalysis); }
  else showList();
}

function activeSection(){
  if(!$("#mediaSection").classList.contains("hidden")) return "media";
  if(!$("#selectionSection").classList.contains("hidden")) return "selection";
  if(!$("#analysisSection").classList.contains("hidden")) return "analysis";
  return "office";
}
function render(){
  if(!DATA.daily||!DATA.daily.length) DATA.daily=genDaily(DATA.month); // モック補完
  renderList(); renderMediaList(); renderSelList();
  const a=activeSection();
  if(a==="media") showMediaList(); else if(a==="selection") showSelList(); else if(a==="analysis") renderAnalysis(); else showList();
  const tag = API_URL ? "" : "（モックデータ）";
  $("#updated").textContent="集計時刻: "+new Date(DATA.generatedAt).toLocaleString("ja-JP")+tag;
}

async function refresh(){
  if(API_URL){
    $("#updated").textContent="読み込み中…";
    try{ DATA = await loadFromApi($("#monthSel").value); }
    catch(err){ $("#updated").textContent="データ取得に失敗: "+err.message; return; }
  }
  render();
}
$("#refreshBtn").addEventListener("click",refresh);
$("#monthSel").addEventListener("change",refresh);
$("#officeChartMode").addEventListener("change",renderChart);
$("#navOffice").addEventListener("click",()=>switchSection("office"));
$("#navMedia").addEventListener("click",()=>switchSection("media"));
$("#navSel").addEventListener("click",()=>switchSection("selection"));
$("#navAna").addEventListener("click",()=>switchSection("analysis"));
$("#exportSelBtn").addEventListener("click",()=>{
  if(!API_URL){ alert("API未設定のため出力できません（モックデータ表示中）"); return; }
  window.open(`${API_URL}?export=selection`,"_blank");
});
$("#exportReportBtn").addEventListener("click",async()=>{
  if(!API_URL){ alert("API未設定のため出力できません（モックデータ表示中）"); return; }
  const btn=$("#exportReportBtn"), label=btn.textContent;
  btn.disabled=true; btn.textContent="出力中…";
  try{
    const res=await fetch(`${API_URL}?export=report&month=${encodeURIComponent($("#monthSel").value)}&t=${Date.now()}`);
    const j=await res.json();
    if(j.ok) alert(`✅ レポートシートに出力しました\n対象月: ${j.month}／${j.offices}オフィス\n集計: ${j.generatedAt}`);
    else alert("⚠️ 出力に失敗: "+(j.error||"unknown"));
  }catch(err){ alert("⚠️ 出力に失敗: "+err.message); }
  finally{ btn.disabled=false; btn.textContent=label; }
});
selectCurrentMonth();
refresh();
</script>
